{% extends 'base.html' %}
{% load static %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
    <div class="flex justify-between container gap-10 mx-auto">
        <div class="w-full lg:w-8/12 md:w-9/12">
            <div class="mt-6">
                <div class="px-10 py-6 bg-white rounded-lg shadow-md">
                    <div class="flex justify-between items-center">
                        <span class="font-light text-gray-600">Jun 1,
                        2020</span>
                        <a href="#"
                           class="px-2 py-1 bg-gray-600 text-gray-100 font-bold rounded hover:bg-gray-500">{{ post.category }}</a>
                    </div>
                    <div class="mt-2">
                        <a href="#" class="text-2xl text-gray-700 font-bold hover:underline">{{ post.title }}</a>
                        <p class="mt-2 text-gray-600 leading-loose">{{ post.body|linebreaks }}</p>
                    </div>
                    <div class="flex justify-between items-center mt-4">
                        <div>
                            <a href="#" class="flex items-center">
                                <img src="{% static "imgs/profile.jpg" %}"
                                     alt="avatar"
                                     class="mx-4 w-10 h-10 object-cover rounded-full hidden sm:block">
                                <h1 class="text-gray-700 font-bold hover:underline">{{ post.author.username|title }}</h1>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="lg:w-4/12 md:w-3/12"></div>
    </div>
{% endblock %}
