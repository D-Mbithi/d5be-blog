{% extends 'base.html' %}

{% block title %}Log Out{% endblock title %}

{% block content %}
<div class="min-h-screen bg-zinc-50 flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8">
    <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-gradient-to-r from-fuchsia-500 to-purple-600 rounded-full flex items-center justify-center shadow-lg">
          <i class="fas fa-utensils text-white text-lg"></i>
        </div>
        <h1 class="text-2xl font-bold text-zinc-900 gradient-text">Flavor Fusion</h1>
    </div>
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-zinc-900 poppins-semibold">
            Are you sure you want to log out?
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-lg sm:rounded-lg sm:px-10">
            <form class="space-y-6" action="{% url 'account_logout' %}" method="post">
                {% csrf_token %}
                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 poppins-semibold">
                        Log Out
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
